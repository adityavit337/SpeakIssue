<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kisan Mitra — AI-powered agricultural policy assistant. Ask about PM-KISAN, PMFBY, and more in any Indian language." />
  <title>Kisan Mitra — Agricultural Policy Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- MP3 encoder -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFFFFF;
      --surface: #F5F5F5;
      --card: #FFFFFF;
      --border: #E5E5E5;
      --accent: #000000;
      --accent2: #000000;
      --danger: #000000;
      --success: #000000;
      --text: #000000;
      --muted: #525252;
      --radius: 0px;
      --font-display: "Playfair Display", Georgia, serif;
      --font-body: "Source Serif 4", Georgia, serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
    }

    /* ── Noise texture (paper-like) ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.02;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Horizontal line texture ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 1px, #000 1px, #000 2px);
      background-size: 100% 4px;
      opacity: 0.012;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Hero decoration ── */
    .hero-decoration {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 20px;
    }
    .hero-rule { flex: 1; height: 4px; background: #000; }
    .hero-square { width: 10px; height: 10px; border: 2px solid #000; flex-shrink: 0; }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 900;
      text-align: center;
      color: #000;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      font-family: var(--font-body);
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 0.01em;
      position: relative;
      z-index: 1;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid #000;
      border-top: 4px solid #000;
      padding: 36px 32px;
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    /* ── Status chip ── */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 24px;
      min-height: 22px;
      transition: color 100ms;
    }

    .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 100ms;
    }

    .status.recording { color: #000; font-weight: 500; }
    .status.recording .dot { background: #000; animation: blink 1s step-start infinite; }
    .status.ready { color: #000; }
    .status.ready .dot { background: #000; }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── Timer ── */
    .timer {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: #000;
      margin-left: auto;
      display: none;
    }
    .recording .timer { display: block; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 10px; }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border: 2px solid #000;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 100ms, color 100ms;
      position: relative;
    }

    .btn:disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
    .btn:not(:disabled):active { transform: scale(0.98); }
    .btn:not(:disabled):focus-visible { outline: 3px solid #000; outline-offset: 3px; }

    #recordBtn { background: #000; color: #fff; }
    #recordBtn:not(:disabled):hover { background: #fff; color: #000; }
    #recordBtn.stop { background: #fff; color: #000; border-style: dashed; }
    #recordBtn.stop:hover { background: #000; color: #fff; }

    #playBtn { background: #fff; color: #000; }
    #playBtn:not(:disabled):hover { background: #000; color: #fff; }

    #downloadBtn {
      background: #fff;
      color: #000;
      flex: 0 0 auto;
      padding: 14px 16px;
    }
    #downloadBtn:not(:disabled):hover { background: #000; color: #fff; }

    /* ── Section divider ── */
    .section-rule { height: 4px; background: #000; margin: 28px 0 20px; }

    /* ── Recordings list ── */
    .recordings-section { margin-top: 0; }

    .recordings-label {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .recordings-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #000 transparent;
    }

    .recording-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #fff;
      border: 1px solid #000;
      border-left: 4px solid transparent;
      padding: 12px 14px;
      transition: border-left-color 100ms;
      animation: slideIn 200ms ease;
    }
    .recording-item:hover { border-left-color: #000; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .rec-icon {
      width: 32px;
      height: 32px;
      background: #F5F5F5;
      border: 1px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .rec-meta { flex: 1; min-width: 0; }

    .rec-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rec-duration {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .rec-actions { display: flex; gap: 6px; }

    .icon-btn {
      background: none;
      border: 1px solid #000;
      width: 30px;
      height: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #000;
      transition: all 100ms;
    }
    .icon-btn:hover { background: #000; color: #fff; }
    .icon-btn:focus-visible { outline: 3px solid #000; outline-offset: 2px; }
    .icon-btn.playing { background: #000; color: #fff; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-family: var(--font-body);
      font-style: italic;
      font-size: 13px;
      padding: 24px 0;
    }

    /* ── Permission error ── */
    .perm-error {
      display: none;
      background: #F5F5F5;
      border: 2px solid #000;
      padding: 12px 16px;
      font-size: 13px;
      color: #000;
      margin-bottom: 16px;
    }

    /* ── RAG answer (inverted card) ── */
    .rag-answer {
      display: none;
      margin-top: 10px;
      padding: 16px 20px;
      background: #000;
      color: #fff;
      font-family: var(--font-body);
      font-size: 13px;
      line-height: 1.7;
    }
    .rag-answer strong { color: #fff; }

    /* ── Source metadata tags ── */
    .sources-section {
      margin-top: 8px;
      padding: 10px 14px;
      background: #F5F5F5;
      border: 1px solid #000;
    }

    .sources-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #000;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .source-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid #000;
      padding: 4px 10px;
      margin: 3px 4px 3px 0;
      font-family: var(--font-mono);
      font-size: 11px;
      color: #000;
      transition: all 100ms;
    }
    .source-tag:hover { background: #000; color: #fff; }
    .source-tag .tag-icon { font-size: 11px; }
    .source-tag .tag-name {
      font-weight: 500;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .source-tag.web-source { border-style: dashed; }
    .source-tag a { color: #000; text-decoration: underline; font-size: 11px; }
    .source-tag:hover a { color: #fff; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      body { padding: 24px 16px; }
      .card { padding: 24px 20px; }
      .btn-row { flex-direction: column; }
      .btn { padding: 14px 16px; }
      .hero-decoration { max-width: 100%; }
    }
  </style>
</head>

<body>


  <div class="hero-decoration"><div class="hero-rule"></div><div class="hero-square"></div></div>
  <h1>Kisan Mitra</h1>
  <p class="subtitle">Ask us anything about agricultural policies — we're here to help</p>
  <div class="card">
    <div id="permError" class="perm-error">
      ⚠️ Microphone access denied. Please allow microphone permissions in your browser settings.
    </div>


    <!-- Status row -->
    <div class="status" id="statusRow" style="justify-content: space-between; align-items: center; width: 100%;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <div class="dot"></div>
        <span id="statusText">Ready to record</span>
        <span class="timer" id="timerDisplay">0:00</span>
      </div>
      <select id="languageSelect"
        style="background: #fff; color: #000; border: 2px solid #000; border-radius: 0; padding: 6px 10px; font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.05em; outline: none; cursor: pointer; text-transform: uppercase;">
        <option value="en">English</option>
        <option value="hi" selected>Hindi</option>
        <option value="bn">Bengali</option>
        <option value="gu">Gujarati</option>
        <option value="kn">Kannada</option>
        <option value="ml">Malayalam</option>
        <option value="mr">Marathi</option>
        <option value="pa">Punjabi</option>
        <option value="ta">Tamil</option>
        <option value="te">Telugu</option>
        <option value="ur">Urdu</option>
      </select>
    </div>

    <!-- Main controls -->
    <div class="btn-row">
      <button class="btn" id="recordBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="12" r="6" />
        </svg>
        <span id="recordLabel">Start Recording</span>
      </button>
      <button class="btn" id="playBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z" />
        </svg>
        <span id="playLabel">Play Latest</span>
      </button>
      <button class="btn" id="downloadBtn" disabled title="Download latest recording">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
        </svg>
      </button>
    </div>

    <!-- Section divider -->
    <div class="section-rule"></div>

    <!-- Recordings history -->
    <div class="recordings-section">
      <div class="recordings-label">Recordings</div>
      <div class="recordings-list" id="recordingsList">
        <div class="empty-state" id="emptyState">No recordings yet. Hit record to start.</div>
      </div>
    </div>
  </div>


  <script>
    // ── HELPER: Build source metadata HTML ──
    // Renders a list of source objects as styled tags showing document names,
    // relevance scores, and clickable web links.
    function buildSourcesHtml(sources) {
      let html = '<div class="sources-label">📚 Sources</div><div>';
      sources.forEach(src => {
        const isWeb = src.type === 'web';
        const icon = isWeb ? '🌐' : '📄';
        const cssClass = isWeb ? 'source-tag web-source' : 'source-tag';
        const name = src.source || 'Unknown';

        let pageHtml = '';
        if (src.page != null) {
          pageHtml = `<span style="font-size:11px; color:var(--muted);">p.${src.page}</span>`;
        }

        let linkHtml = '';
        if (isWeb && src.url) {
          linkHtml = `<a href="${src.url}" target="_blank" rel="noopener">↗ Open</a>`;
        }

        html += `<span class="${cssClass}">
          <span class="tag-icon">${icon}</span>
          <span class="tag-name" title="${name}">${name}</span>
          ${pageHtml}${linkHtml}
        </span>`;
      });
      html += '</div>';
      return html;
    }

    // ── BLOCK 1: DOM ELEMENT REFERENCES ──
    // Caches references to all interactive HTML elements so we can update their
    // state (text, classes, visibility) from JavaScript without repeated DOM lookups.
    const recordBtn = document.getElementById('recordBtn');
    const recordLabel = document.getElementById('recordLabel');
    const playBtn = document.getElementById('playBtn');
    const playLabel = document.getElementById('playLabel');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusRow = document.getElementById('statusRow');
    const statusText = document.getElementById('statusText');
    const timerDisplay = document.getElementById('timerDisplay');
    const permError = document.getElementById('permError');
    const recordingsList = document.getElementById('recordingsList');
    const emptyState = document.getElementById('emptyState');

    // ── BLOCK 2: APPLICATION STATE VARIABLES ──
    // These variables hold the runtime state of the audio recording pipeline.
    // mediaRecorder stores the mic stream reference so we can stop it on teardown.
    // mp3Chunks accumulates encoded MP3 frame buffers from lamejs during recording.
    // scriptProcessor is the Web Audio ScriptProcessorNode that taps raw PCM samples.
    // recordings[] is the in-memory list of all completed recordings in this session.
    let mediaRecorder = null;
    let mp3Chunks = [];
    let mp3Encoder = null;
    let scriptProcessor = null;
    let recordings = [];
    let isRecording = false;
    let timerInterval = null;
    let elapsed = 0;
    let currentlyPlaying = null;

    // AudioContext and source node needed for the Web Audio recording pipeline
    let audioCtx = null, source = null;
    const MP3_BITRATE = 128;  // kbps — controls output file size vs quality
    const SAMPLE_RATE = 44100; // Hz — CD-quality sample rate for the mic input

    // ── BLOCK 3: RECORDING TIMER ──
    // Tracks how long the current recording has been running. The elapsed value
    // is displayed in the UI during recording and saved as the duration metadata
    // for each completed recording in the recordings list.
    function fmtTime(s) {
      const m = Math.floor(s / 60);
      return `${m}:${String(s % 60).padStart(2, '0')}`;
    }
    function startTimer() {
      elapsed = 0;
      timerDisplay.textContent = fmtTime(0);
      timerInterval = setInterval(() => {
        elapsed++;
        timerDisplay.textContent = fmtTime(elapsed);
      }, 1000);
    }
    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    // ── BLOCK 4: UI STATUS MANAGEMENT ──
    // Updates the status indicator row (the colored dot + text below the controls).
    // The 'state' parameter controls the CSS class which changes the dot color:
    //   'recording' → red blinking dot, 'ready' → green dot, '' → grey dot.
    function setStatus(state, text) {
      statusRow.className = 'status ' + state;
      statusText.textContent = text;
    }

    // ── BLOCK 5: RECORDING LIST MANAGEMENT ──
    // When a recording finishes, this function creates a new UI card for it in the
    // recordings list. Each card shows the recording name, duration, play/download/delete
    // buttons, and a transcription area that gets populated after the API responds.
    function addRecordingItem(blob, duration) {
      const idx = recordings.length + 1;
      const name = `Recording ${idx}`;
      const urll = URL.createObjectURL(blob);

      // Remove empty state
      emptyState.style.display = 'none';

      const item = document.createElement('div');
      item.className = 'recording-item';
      item.innerHTML = `
      <div class="rec-icon">🎙️</div>
      <div class="rec-meta">
        <div class="rec-name">${name}</div>
        <div class="rec-duration">${fmtTime(duration)}</div>
        <div class="rec-transcription" style="font-size: 13px; color: #000; margin-top: 6px; display: none; background: #F5F5F5; padding: 8px 12px; border: 1px solid #000;"></div>
      </div>
      <div class="rec-actions">
        <button class="icon-btn play-ic" title="Play">▶</button>
        <button class="icon-btn dl-ic" title="Download">⬇</button>
        <button class="icon-btn del-ic" title="Delete">✕</button>
      </div>`;

      const record = { blob, url: urll, duration, name, el: item };
      recordings.push(record);
      recordingsList.appendChild(item);

      // Wire buttons
      const playIc = item.querySelector('.play-ic');
      const dlIc = item.querySelector('.dl-ic');
      const delIc = item.querySelector('.del-ic');

      playIc.addEventListener('click', () => playRecording(record, playIc));
      dlIc.addEventListener('click', () => download(record));
      delIc.addEventListener('click', () => deleteRecording(record));

      // Scroll into view
      item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      return record;
    }

    function playRecording(record, iconBtn) {
      // Stop any currently playing audio
      if (currentlyPlaying) {
        currentlyPlaying.audio.pause();
        currentlyPlaying.audio.currentTime = 0;
        currentlyPlaying.iconBtn.textContent = '▶';
        currentlyPlaying.iconBtn.classList.remove('playing');
      }

      if (currentlyPlaying && currentlyPlaying.record === record) {
        currentlyPlaying = null;
        setStatus('ready', 'Playback stopped');
        return;
      }

      const audio = new Audio(record.url);
      currentlyPlaying = { audio, record, iconBtn };
      iconBtn.textContent = '⏸';
      iconBtn.classList.add('playing');
      setStatus('ready', `Playing: ${record.name}`);

      audio.play();
      audio.addEventListener('ended', () => {
        iconBtn.textContent = '▶';
        iconBtn.classList.remove('playing');
        setStatus('ready', 'Playback complete');
        currentlyPlaying = null;
      });
    }

    function download(record) {
      const a = document.createElement('a');
      a.href = record.url;
      a.download = `${record.name.replace(' ', '_')}.mp3`;
      a.click();
    }

    function deleteRecording(record) {
      URL.revokeObjectURL(record.url);
      record.el.remove();
      recordings = recordings.filter(r => r !== record);
      if (recordings.length === 0) {
        emptyState.style.display = '';
        playBtn.disabled = true;
        downloadBtn.disabled = true;
      }
    }

    // ── BLOCK 6: MICROPHONE CAPTURE & REAL-TIME MP3 ENCODING ──
    // This is the core recording pipeline. It requests microphone access via
    // getUserMedia(), creates a Web Audio graph to tap raw PCM samples, and
    // encodes them into MP3 frames in real-time using the lamejs library.
    // The flow is: Microphone → AudioContext → ScriptProcessorNode → lamejs MP3 Encoder → mp3Chunks[]
    async function startRecording() {
      permError.style.display = 'none';
      let stream;
      try {
        // Request mono audio from the user's microphone at 44.1kHz
        stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: SAMPLE_RATE, channelCount: 1 } });
      } catch {
        // If the user denies permission, show the error banner and abort
        permError.style.display = 'block';
        return;
      }

      // Create a Web Audio context and connect the mic stream as a source node
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
      source = audioCtx.createMediaStreamSource(stream);

      // ── MP3 encoder setup ──
      mp3Chunks = [];
      mp3Encoder = new lamejs.Mp3Encoder(1 /* mono */, SAMPLE_RATE, MP3_BITRATE);

      // ScriptProcessorNode taps raw PCM float32 samples
      const bufSize = 4096;
      scriptProcessor = audioCtx.createScriptProcessor(bufSize, 1, 1);
      source.connect(scriptProcessor);
      scriptProcessor.connect(audioCtx.destination);

      scriptProcessor.onaudioprocess = (e) => {
        const float32 = e.inputBuffer.getChannelData(0);
        // Convert Float32 [-1,1] → Int16 for lame
        const int16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          const s = Math.max(-1, Math.min(1, float32[i]));
          int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        const encoded = mp3Encoder.encodeBuffer(int16);
        if (encoded.length > 0) mp3Chunks.push(new Uint8Array(encoded));
      };

      // Keep stream reference so we can stop all mic tracks on teardown
      mediaRecorder = { stream };

      // Update UI to reflect recording state
      isRecording = true;
      recordBtn.classList.add('stop');
      recordLabel.textContent = 'Stop Recording';
      setStatus('recording', 'Recording (MP3)…');
      startTimer();
      statusRow.classList.add('recording');
    }

    function stopRecording() {
      if (!isRecording) return;
      isRecording = false;
      stopTimer();

      // Flush any remaining PCM samples through the MP3 encoder
      const final = mp3Encoder.flush();
      if (final.length > 0) mp3Chunks.push(new Uint8Array(final));

      // Combine all encoded MP3 frame buffers into a single downloadable Blob
      const blob = new Blob(mp3Chunks, { type: 'audio/mpeg' });
      const rec = addRecordingItem(blob, elapsed);

      // Immediately send the recording to the Flask backend for transcription
      transcribeRecording(rec);

      // Enable the "Play Latest" and "Download" toolbar buttons
      playBtn.disabled = false;
      downloadBtn.disabled = false;
      playBtn._latest = rec;
      downloadBtn._latest = rec;

      // Tear down the entire Web Audio graph and release the microphone
      scriptProcessor.disconnect();
      source.disconnect();
      audioCtx.close();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());

      // Reset UI back to idle state
      statusRow.classList.remove('recording');
      recordBtn.classList.remove('stop');
      recordLabel.textContent = 'Start Recording';
      setStatus('ready', 'MP3 recording saved ✓');
    }

    // ── BLOCK 7: BUTTON EVENT HANDLERS ──
    // Wires click events to the three toolbar buttons: Record (toggle), Play Latest, Download.
    recordBtn.addEventListener('click', () => {
      isRecording ? stopRecording() : startRecording();
    });

    playBtn.addEventListener('click', () => {
      const rec = playBtn._latest;
      if (!rec) return;
      const iconBtn = rec.el.querySelector('.play-ic');
      playRecording(rec, iconBtn);
    });

    downloadBtn.addEventListener('click', () => {
      const rec = downloadBtn._latest;
      if (rec) download(rec);
    });

    // ── BLOCK 8: BACKEND API COMMUNICATION ──
    // After a recording is saved, this function POSTs the MP3 blob to the Flask
    // /transcribe endpoint along with the selected language code. The backend runs
    // the full pipeline: IndicConformer ASR → IndicTrans2 translation → RAG query.
    // The response contains the transcription, English translation, and RAG answer text.
    async function transcribeRecording(record) {
      const transDiv = record.el.querySelector('.rec-transcription');
      transDiv.style.display = 'block';
      transDiv.innerHTML = '<span style="color: var(--accent);">Transcribing...</span>';

      const formData = new FormData();
      formData.append('audio', record.blob, 'recording.mp3');

      const lang = document.getElementById('languageSelect').value;
      if (lang) {
        formData.append('language', lang);
      }

      try {
        const response = await fetch('http://localhost:5000/transcribe', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();
        if (data.error) {
          transDiv.innerHTML = `<span style="color: var(--danger);">Error: ${data.error}</span>`;
        } else {
          let html = `<strong>Transcription:</strong> ${data.text}`;
          if (data.translation) {
            html += `<br><strong style="margin-top: 8px; display: inline-block; color: var(--accent);">Translation (EN):</strong> <span style="color: var(--text-light);">${data.translation}</span>`;
          }
          transDiv.innerHTML = html;

          // ── Display RAG answer as text ──
          if (data.rag_answer) {
            const ragDiv = document.createElement('div');
            ragDiv.className = 'rag-answer';
            ragDiv.style.display = 'block';
            ragDiv.innerHTML = `<strong>🤖 Kisan Mitra:</strong><br>${data.rag_answer}`;
            transDiv.parentNode.appendChild(ragDiv);
          }

          // ── Display source metadata ──
          if (data.sources && data.sources.length > 0) {
            const sourcesDiv = document.createElement('div');
            sourcesDiv.className = 'sources-section';
            sourcesDiv.innerHTML = buildSourcesHtml(data.sources);
            transDiv.parentNode.appendChild(sourcesDiv);
          }
        }
      } catch (err) {
        transDiv.innerHTML = `<span style="color: var(--danger);">Error connecting to server. Is app.py running?</span>`;
      }
    }

    // ── SIMPLE PERSISTENT STORAGE LOGIC ──
    // This is the beginner-friendly logic to load old recordings from the database
    // and show them on the screen when the page opens.
    
    function addHistoryItem(dbItem) {
      // Create a URL that points to our new Flask /audio endpoint
      const audioUrl = 'http://localhost:5000/audio/' + dbItem.filename;
      
      // Remove the "No recordings yet" message
      emptyState.style.display = 'none';

      // Create the HTML for the recording card
      const itemDiv = document.createElement('div');
      itemDiv.className = 'recording-item';
      
      // Build the transcription HTML from the database data
      let textHtml = `<strong>Transcription:</strong> ${dbItem.transcription}`;
      if (dbItem.translation) {
        textHtml += `<br><strong style="margin-top: 8px; display: inline-block; color: var(--accent);">Translation (EN):</strong> <span style="color: var(--text-light);">${dbItem.translation}</span>`;
      }
      
      let ragHtml = "";
      if (dbItem.rag_answer) {
        ragHtml = `<div class="rag-answer" style="display: block;"><strong>🤖 Kisan Mitra:</strong><br>${dbItem.rag_answer}</div>`;
      }

      let sourcesHtml = "";
      const sources = dbItem.sources || [];
      if (sources.length > 0) {
        sourcesHtml = `<div class="sources-section">${buildSourcesHtml(sources)}</div>`;
      }

      itemDiv.innerHTML = `
      <div class="rec-icon">🎙️</div>
      <div class="rec-meta">
        <div class="rec-name">Saved: ${dbItem.filename}</div>
        <div class="rec-duration">From DB</div>
        <div class="rec-transcription" style="font-size: 13px; color: #000; margin-top: 6px; display: block; background: #F5F5F5; padding: 8px 12px; border: 1px solid #000;">
          ${textHtml}
        </div>
        ${ragHtml}
        ${sourcesHtml}
      </div>
      <div class="rec-actions">
        <button class="icon-btn play-ic" title="Play">▶</button>
      </div>`;

      // Save it in our array so the play button works
      const record = { url: audioUrl, name: dbItem.filename, el: itemDiv };
      recordings.push(record);
      recordingsList.appendChild(itemDiv);

      // Make the play button work
      const playBtn = itemDiv.querySelector('.play-ic');
      playBtn.addEventListener('click', () => playRecording(record, playBtn));
    }

    async function loadHistory() {
      try {
        const response = await fetch('http://localhost:5000/history');
        const historyData = await response.json();
        
        // Loop through the data and add each one to the screen
        for (let i = 0; i < historyData.length; i++) {
          addHistoryItem(historyData[i]);
        }
      } catch (err) {
        console.log("Could not load history. Is app.py running?", err);
      }
    }

    // ── Initial state ──
    setStatus('', 'Ready to record');
    
    // Load old recordings when the page starts
    loadHistory();
  </script>
</body>

</html>
